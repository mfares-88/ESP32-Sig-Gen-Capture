

;///////////////////////************************Environment for ESP32-S3 LCD****************************////////////////

[env:esp32-s3-n4r8]
; Use the pioarduino platform (pick ONE of the two lines below)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
;platform = https://github.com/pioarduino/platform-espressif32.git#develop

board     = esp32-s3-devkitc-1
framework = arduino

; --- N4R8 (4MB QD flash, 8MB OPI PSRAM) + your Arduino Tools settings ---
board_build.f_cpu       = 240000000L
board_build.f_flash     = 80000000L
board_build.flash_mode  = dio
board_build.psram_type  = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 4MB
board_build.partitions  = partitions_signalgen.csv
board_build.filesystem  = littlefs

; USB CDC, Serial Plotter speed, and convenience flags
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -DSIGGEN_USE_LITTLEFS=1
  -DSIGGEN_BACKEND_TABLE=1
  -DSIGGEN_HAS_DISPLAY=1
  -I${PROJECT_DIR}/include
  -Wno-narrowing


; NOTE on LittleFS: arduino-esp32 v2.0.4+ bundles the `LittleFS` Arduino library
; as part of the framework — no `lib_deps` entry is required. The
; `-DSIGGEN_USE_LITTLEFS=1` flag above is what gates our wrapper in
; lib/sweep_compression/LittleFSInit.{h,cpp}. WROOM env intentionally does not
; set this flag (per §8 risk #1 — WROOM has no LittleFS partition).
lib_deps =
  lvgl/lvgl@^9.2.2
  moononournation/GFX Library for Arduino@^1.5.6
  moononournation/Dev Device Pins@^0.0.2
  TAMC_GT911@^1.0.2

monitor_speed  = 921600
upload_speed   = 921600
monitor_eol     = LF                 ; your sketch expects '\n'
monitor_echo    = yes                ; show what you typed
monitor_filters = send_on_enter, time, esp32_exception_decoder


